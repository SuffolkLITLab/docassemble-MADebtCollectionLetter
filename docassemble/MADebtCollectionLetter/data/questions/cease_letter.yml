metadata:
  title: >-
    Cease Debt Collections Letter
  short title: >-
    Cease Collections
  description: |-
    This interview helps someone in Massachusetts write a "cease communications" letter to a debt collection agency.
    A "cease communications letter" is a letter you can send to a debt collection agency to ask that they stop contacting you about a debt.
  can_I_use_this_form: |
    If you are a person being contacted about a debt you owe, you can use this interview to request the debt collection agency stop contacting you.
    If you make less than $750 per week, or if your income is from certain protected sources, the debt collection agency may not be able to take certain actions against you, such as garnishing your wages. If that is the case for you, this interview will also help you write a letter to the debt collection agency explaining that.
  before_you_start: |    
    Before you get started, please gather:
    
    1. debt collection agency's name and address
    1. Your account number
    1. Creditor's name
    
    When you are finished, you will need to:
    
    1. Print this letter
    1. Sign and mail to the debt collection agency
  maturity: production
  estimated_completion_minutes: 10
  estimated_completion_delta: 5
