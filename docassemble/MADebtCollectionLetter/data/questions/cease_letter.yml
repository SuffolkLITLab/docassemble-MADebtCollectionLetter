id: Cease_Letter
continue button field: cease_letter_intro
question: |
  Cease Letter
subquestion: |
  This interview will help you write a cease communications letter to a debt collection agency.
  
  Before you get started, please gather:
  
  1. The debt collection agency's name and address
  1. Your account number
  1. The creditor's name
  
  When you are finished, you will need to:
  
  1. Print this letter
  1. Sign and mail to the debt collection agency

  If you are a person being contacted about a debt you owe, you can use this interview to request the debt collection agency stop contacting you.

  Most people take about 10 minutes to complete this interview.
---
id: Account Number
question: |
  Account Number
fields:
  - Do you have an account number assigned by the debt collection agency?: user_has_account_number
    datatype: yesnoradio
  - "Account number assigned by debt holder": debt_account_number
    required: False
    show if: user_has_account_number
---
id: Types of Income Protected from Debt Repayment
question: |
  Types of Income Protected from Debt Repayment
subquestion: |
  You can't be ordered to pay a debt from certain types of income.
fields:
  - "Is your income from:": collection_proof
    datatype: checkboxes
    choices:
      - Social Security (SSI, SSDI): Social Security (SSI, SSDI)
      - Old-Age, Survivors, and Disability Insurance (OASDI): Old-Age, Survivors, and Disability Insurance (OASDI)
      - Public Assistance (TAFDC, EAFDC): Public Assistance (TAFDC, EAFDC)
      - Unemployment Compensation: Unemployment Compensation
      - Workers Compensation: Workers Compensation
      - Veterans Benefits: Veterans Benefits
      - Railroad Retirement Benefits: Railroad Retirement Benefits
      - Pensions (public and private): Pensions (public and private)
      - Retirement Funds: Retirement Funds
      - I am employed and I make less than $750 per week: I am employed and I make less than $750 per week
    required: False
---
